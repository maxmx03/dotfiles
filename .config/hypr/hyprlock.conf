general {
    ignore_empty_input = false
    hide_cursor = false
}

background {
    path = /usr/share/hypr/wall2.png
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
}

input-field {
    size = 250, 60
    outline_thickness = 0
    outer_color = rgba(0, 0, 0, 0)
    dots_size = 0.1
    dots_spacing = 1
    dots_center = true
    inner_color = rgba(220,220,220,0.5)
    font_color = rgb(000000)
    fade_on_empty = true
    hide_input = false
    position = 0, -370
    halign = center
    valign = center
    zindex = 20
}

$fn_greet=echo "<i>Please enter your password</i>"
label {
    text = cmd[update:60000] $fn_greet 
    color = rgba(255,255,255,0.9)
    font_size = 17
    font_family = JetBrains Mono Nerd Font Mono
    position = 0, -250
    halign = center
    valign = center
}
